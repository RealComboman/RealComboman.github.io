<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Convertions</title>
<style>
body {font-family: Arial, sans-serif; font-size: 1.0em; display: flex; justify-content: center; align-items: center; height: 70vh; background-color: #ffffff; }
#timeResult {font-style: bold;}
</style></head>
<body>
<divstyle="margin:0 -16px">
<h2>Time 🕑</h2>
<div class="conversion" id="time"> 
<h3 class="category-title">Time Unit Conversion</h3> 
<p>Type a value in to convert between measurements.</p>
<input type="number" id="timeInput" class="input" placeholder="Enter value"> 
<select id="fromTimeUnit" class="unit-select" onClick="timeFn()"> 
 <option value="millisecond">Millisecond</option> 
 <option value="second">Second</option> 
 <option value="minute" selected>Minute</option> 
 <option value="hour">Hour</option> 
 <option value="beat">.Beat™</option> 
 <option value="day">Day</option> 
 <option value="week">Week</option> 
 <option value="fortnight">Fortnight</option> 
 <option value="month">Month</option> 
 <option value="year">Year (Common)</option>
 <option value="yearj">Year (Julian)</option>
 <option value="decade">Decade</option>
 <option value="century">Century</option>
</select> 
<span class="arrow"> ⟹ </span> 
<select id="toTimeUnit" class="unit-select" onClick="timeFn()"> 
 <option value="millisecond">Millisecond</option> 
 <option value="second" selected>Second</option> 
 <option value="minute">Minute</option> 
 <option value="hour">Hour</option> 
 <option value="beat">.Beat™</option> 
 <option value="day">Day</option> 
 <option value="week">Week</option> 
 <option value="fortnight">Fortnight</option> 
 <option value="month">Month</option> 
 <option value="year">Year (Common)</option>
 <option value="yearj">Year (Julian)</option>
 <option value="decade">Decade</option>
 <option value="century">Century</option>
</select> 
<!--button id="timeConvertBtn" class="convert-button" onClick="timeFn()">Convert</button--> 
<div><p id="timeResult" style="bold;">Result will be displayed here</p></div> 
</div> 
<br><hr>
<h3 class="category-title">Current Time ⏳</h3> 
Current time based on your device's system clock: <br>
<b><div id="demo"></div></b><br>
Current moon phase: <br>
<div id="weather"></div><br>
Unix Epoch Time: <b><div id="epoc">NOT AVAILABLE</div> <div id="hexpoc">NOT AVAILABLE</div></b>
<br><hr>
<a href="ref_timeline.html">Timeline of History 🗓</a>
</body>
<script type="text/javascript">
const d = new Date();
const weatherDiv=document.getElementById('weather');
document.getElementById("demo").innerHTML = d;
const epoch= Date.now();
document.getElementById("epoc").innerHTML = Date.now();
const hexstring = epoch.toString(16);
document.getElementById("hexpoc").innerHTML = hexstring;
GetMoon();
var m = Math.abs(((date.getTime() / 86400000) - 18256.8) / 29.53059); var phase = (m - Math.floor(m));



function GetMoon(){
var moon;
if(phase<0.125){moon="🌑 New Moon";}
else if(phase<0.25){moon="🌒 Waxing Crescent";}
else if(phase<0.375){moon="🌓 First Quarter";}
else if(phase<0.5){moon="🌔 Waxing Gibbous";}
else if(phase<0.625){moon="🌕 Full Moon";}
else if(phase<0.75){moon="🌖 Waning Gibbous";}
else if(phase<0.875){moon="🌗 Last Quarter";}
else {moon="🌘 Waning Crescent";}
const weatherContent=`<b>${moon}</b>`;
weatherDiv.innerHTML=weatherContent;
}

function timeFn() { 
 let valInput = parseFloat( 
 	document.getElementById( 
 		"timeInput").value); 
 let fromUnit = 
 	document.getElementById( 
 		"fromTimeUnit").value; 
 let toUnit = 
 	document.getElementById( 
 		"toTimeUnit").value; 
 let conversionFactors = { 
 	second: 1, 
 	millisecond: 1000, 
 	minute: 1 / 60, 
 	beat: 1 / 86.4, 
 	hour: 1 / 3600, 
 	day: 1 / 86400, 
 	fortnight: 1 / 1209600, 
 	week: 1 / 604800, 
 	month: 1 / 2628000, 
 	decade: 1 / 315360000, 
 	century: 1 / 3153600000, 
 	yearj: 1 / 31557600, 
 	year: 1 / 31536000,}; 
 let result = valInput * (conversionFactors[toUnit] / conversionFactors[fromUnit]); 
 document.getElementById("timeResult").textContent = `Result: ${result.toFixed( 4 )} ${toUnit}`; 
}
</script></html>
